name = "juris-web"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"

# ── UAT (PR preview) ──
[env.uat]
name = "juris-web-uat"
[env.uat.vars]
ENVIRONMENT = "uat"

# ── Staging (main branch) ──
[env.staging]
name = "juris-web-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

# ── Production ──
[env.production]
name = "juris-web"
[env.production.vars]
ENVIRONMENT = "production"
