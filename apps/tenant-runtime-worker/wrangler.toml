name = "juris-tenant-runtime"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "TENANT_DB"
database_name = "juris-tenant"
database_id = ""

[[r2_buckets]]
binding = "TENANT_STORAGE"
bucket_name = "juris-tenant-storage"

[[vectorize]]
binding = "TENANT_VECTOR_INDEX"
index_name = "juris-tenant-vectors"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"

# ── UAT ──
[env.uat]
name = "juris-tenant-runtime-uat"
[[env.uat.r2_buckets]]
binding = "TENANT_STORAGE"
bucket_name = "juris-tenant-storage-uat"
[env.uat.vars]
ENVIRONMENT = "uat"
LOG_LEVEL = "debug"

# ── Staging ──
[env.staging]
name = "juris-tenant-runtime-staging"
[[env.staging.r2_buckets]]
binding = "TENANT_STORAGE"
bucket_name = "juris-tenant-storage-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"

# ── Production ──
[env.production]
name = "juris-tenant-runtime"
[[env.production.r2_buckets]]
binding = "TENANT_STORAGE"
bucket_name = "juris-tenant-storage"
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
