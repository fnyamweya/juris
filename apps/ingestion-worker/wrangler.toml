name = "jusris-ingestion"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[queues.producers]]
queue = "jusris-ingestion"
binding = "INGESTION_QUEUE"

[[queues.consumers]]
queue = "jusris-ingestion"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 10

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "info"
