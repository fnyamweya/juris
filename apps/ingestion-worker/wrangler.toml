name = "juris-ingestion"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[queues.producers]]
queue = "juris-ingestion"
binding = "INGESTION_QUEUE"

[[queues.consumers]]
queue = "juris-ingestion"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 10

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"

# ── UAT ──
[env.uat]
name = "juris-ingestion-uat"
[[env.uat.queues.producers]]
queue = "juris-ingestion-uat"
binding = "INGESTION_QUEUE"
[[env.uat.queues.consumers]]
queue = "juris-ingestion-uat"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 10
[env.uat.vars]
ENVIRONMENT = "uat"
LOG_LEVEL = "debug"

# ── Staging ──
[env.staging]
name = "juris-ingestion-staging"
[[env.staging.queues.producers]]
queue = "juris-ingestion-staging"
binding = "INGESTION_QUEUE"
[[env.staging.queues.consumers]]
queue = "juris-ingestion-staging"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 10
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"

# ── Production ──
[env.production]
name = "juris-ingestion"
[[env.production.queues.producers]]
queue = "juris-ingestion"
binding = "INGESTION_QUEUE"
[[env.production.queues.consumers]]
queue = "juris-ingestion"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
