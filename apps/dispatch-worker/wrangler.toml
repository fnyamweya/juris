name = "juris-dispatch"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "MASTER_REGISTRY_DB"
database_name = "juris-master-registry"
database_id = ""

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"
CF_ACCESS_TEAM_DOMAIN = ""
CF_ACCESS_AUD = ""

# ── UAT (PR preview) ──
[env.uat]
name = "juris-dispatch-uat"
[env.uat.vars]
ENVIRONMENT = "uat"
LOG_LEVEL = "debug"

# ── Staging (main branch) ──
[env.staging]
name = "juris-dispatch-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "info"

# ── Production ──
[env.production]
name = "juris-dispatch"
[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"
