name: Deploy Production

on:
  push:
    branches: [production]

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-production:
    name: Deploy to Production
    needs: [ci]
    uses: ./.github/workflows/deploy-workers.yml
    with:
      environment: production
      ref: ${{ github.sha }}
    secrets: inherit
