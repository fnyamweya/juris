name: Deploy Workers (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (uat | staging | production)'
        required: true
        type: string
      ref:
        description: 'Git ref to deploy'
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      MASTER_REGISTRY_D1_ID:
        required: false
      TENANT_D1_ID:
        required: false
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Inject D1 database IDs
        run: |
          sed -i 's/database_id = ""/database_id = "'"$MASTER_REGISTRY_D1_ID"'"/' \
            apps/dispatch-worker/wrangler.toml \
            apps/provisioning-worker/wrangler.toml \
            apps/maintenance-worker/wrangler.toml
          sed -i 's/database_id = ""/database_id = "'"$TENANT_D1_ID"'"/' \
            apps/tenant-runtime-worker/wrangler.toml
        env:
          MASTER_REGISTRY_D1_ID: ${{ secrets.MASTER_REGISTRY_D1_ID }}
          TENANT_D1_ID: ${{ secrets.TENANT_D1_ID }}

      - name: Ensure queues exist
        run: |
          ENV_SUFFIX=""
          if [[ "${{ inputs.environment }}" != "production" ]]; then
            ENV_SUFFIX="-${{ inputs.environment }}"
          fi
          for base in juris-provisioning juris-ingestion; do
            queue="${base}${ENV_SUFFIX}"
            if ! npx wrangler queues list 2>/dev/null | grep -q "\"queue_name\":\"${queue}\""; then
              echo "Creating queue: $queue"
              npx wrangler queues create "$queue"
            else
              echo "Queue exists: $queue"
            fi
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Dispatch Worker
        run: pnpm --filter @juris/dispatch-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Provisioning Worker
        run: pnpm --filter @juris/provisioning-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Maintenance Worker
        run: pnpm --filter @juris/maintenance-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Ingestion Worker
        run: pnpm --filter @juris/ingestion-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Tenant Runtime Worker
        run: pnpm --filter @juris/tenant-runtime-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Webhook Worker
        run: pnpm --filter @juris/webhook-worker run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag deployment
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE=$(date -u +"%Y.%m.%d")
          ENV="${{ inputs.environment }}"
          VERSION=$(node -p "require('./package.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="deploy/${ENV}/${DATE}-${SHORT_SHA}"
          git tag -a "${TAG}" -m "Deployed to ${ENV}

          Version: v${VERSION}
          Environment: ${ENV}
          Commit: ${GITHUB_SHA}
          Date: $(date -u +\"%Y-%m-%dT%H:%M:%SZ\")
          Actor: ${{ github.actor }}
          Workers: dispatch, provisioning, maintenance, ingestion, tenant-runtime, webhooks"
          git push origin "${TAG}"

          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`v${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deploy Tag** | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Ref** | \`${{ inputs.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Workers** | dispatch, provisioning, maintenance, ingestion, tenant-runtime, webhooks |" >> "$GITHUB_STEP_SUMMARY"
