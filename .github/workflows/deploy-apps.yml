name: Deploy App (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (uat | staging | production)'
        required: true
        type: string
      app:
        description: 'App to deploy (web | dashboard)'
        required: true
        type: string
      ref:
        description: 'Git ref to deploy'
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      TURBO_TOKEN:
        required: false
      TURBO_TEAM:
        required: false

concurrency:
  group: deploy-${{ inputs.app }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve version metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE=$(date -u +"%Y.%m.%d")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          APP="${{ inputs.app }}"
          ENV="${{ inputs.environment }}"

          if [[ "$ENV" == "production" ]]; then
            WORKER_NAME="juris-${APP}"
          else
            WORKER_NAME="juris-${APP}-${ENV}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=deploy/${APP}/${ENV}/${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ inputs.app }} with version injection
        run: npx turbo run build --filter='@juris/${{ inputs.app }}...'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.meta.outputs.version }}
          NEXT_PUBLIC_COMMIT_SHA: ${{ steps.meta.outputs.short_sha }}
          NEXT_PUBLIC_DEPLOY_ENV: ${{ inputs.environment }}

      - name: Deploy ${{ inputs.app }}
        run: pnpm --filter '@juris/${{ inputs.app }}' run deploy
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          WORKER="${{ steps.meta.outputs.worker_name }}"
          echo "Verifying deployment for: ${WORKER}"

          # Check wrangler deployment registry
          if npx wrangler deployments list --name "$WORKER" 2>/dev/null | head -5 | grep -q "Created"; then
            echo "✅ Wrangler deployment confirmed"
          else
            echo "⚠️ Could not verify via wrangler (may need manual check)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag deployment receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.meta.outputs.deploy_tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ENV="${{ inputs.environment }}"
          APP="${{ inputs.app }}"
          WORKER="${{ steps.meta.outputs.worker_name }}"

          git tag -a "${TAG}" -m "Deploy ${APP} to ${ENV}

          App: ${APP}
          Worker: ${WORKER}
          Version: v${VERSION}
          Environment: ${ENV}
          Commit: ${GITHUB_SHA}
          Date: ${{ steps.meta.outputs.timestamp }}
          Actor: ${{ github.actor }}"
          git push origin "${TAG}"
          echo "Tagged: ${TAG}"

      - name: Deployment summary
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          TIMESTAMP="${{ steps.meta.outputs.timestamp }}"
          APP="${{ inputs.app }}"
          ENV="${{ inputs.environment }}"
          WORKER="${{ steps.meta.outputs.worker_name }}"
          TAG="${{ steps.meta.outputs.deploy_tag }}"

          echo "## App Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | \`${APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Worker** | \`${WORKER}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`v${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deploy Tag** | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | \`${TIMESTAMP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
